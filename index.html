<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figuereo Muebles</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

#search{
padding:8px;
border-radius:5px;
border:none;
}

.cart{
background:#27ae60;
padding:10px;
border-radius:5px;
cursor:pointer;
}

.hero{
background:url("https://images.unsplash.com/photo-1618220179428-22790b461013") center/cover;
height:300px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:35px;
font-weight:bold;
}

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
padding:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#27ae60;
font-weight:bold;
font-size:18px;
}

button{
background:#27ae60;
border:none;
color:white;
padding:10px;
border-radius:5px;
cursor:pointer;
}

#cartPanel{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:white;
box-shadow:-4px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.4s;
overflow:auto;
}

#cartPanel.open{
right:0;
}

.closeCart{
background:red;
color:white;
padding:5px 8px;
border:none;
cursor:pointer;
float:right;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.remove{
background:red;
color:white;
border:none;
padding:4px;
cursor:pointer;
}

.whatsapp{
background:#25D366;
color:white;
width:100%;
padding:12px;
border:none;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<h1>Figuereo Muebles</h1>

<input type="text" id="search" placeholder="Buscar muebles..." onkeyup="buscar()">

<div class="cart" onclick="toggleCart()">
🛒 Carrito: <span id="cartCount">0</span>
</div>

</header>

<div class="hero">
Muebles modernos para tu hogar
</div>

<div class="container">

<h2>Catálogo</h2>

<div class="grid">

<div class="card" data-name="sofa">
<img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc">
<h3>Sofá Moderno</h3>
<p class="price">RD$25,000</p>
<button onclick="addCart('Sofá Moderno',25000)">Agregar</button>
</div>

<div class="card" data-name="cama">
<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
<h3>Cama King</h3>
<p class="price">RD$35,000</p>
<button onclick="addCart('Cama King',35000)">Agregar</button>
</div>

<div class="card" data-name="mesa">
<img src="https://images.unsplash.com/photo-1588854337221-4cf9fa96059c">
<h3>Mesa Comedor</h3>
<p class="price">RD$18,000</p>
<button onclick="addCart('Mesa Comedor',18000)">Agregar</button>
</div>

<div class="card" data-name="silla">
<img src="https://images.unsplash.com/photo-1615874959474-d609969a20ed">
<h3>Silla Moderna</h3>
<p class="price">RD$4,500</p>
<button onclick="addCart('Silla Moderna',4500)">Agregar</button>
</div>

</div>

</div>

<!-- PANEL DEL CARRITO -->
<div id="cartPanel">

<button class="closeCart" onclick="toggleCart()">X</button>

<h2>Carrito</h2>

<div id="cartItems"></div>

<h3>Total: RD$<span id="total">0</span></h3>

<button class="whatsapp" onclick="comprarWhatsApp()">Comprar por WhatsApp</button>

</div>

<footer>

<p>📍 Azua de Compostela , República Dominicana</p>
<p>📞 809-546-2835</p>
<p>© 2026 Figuereo Muebles</p>

</footer>

<script>

let cart=[]
let total=0

function addCart(nombre,precio){

cart.push({nombre,precio})

total+=precio

document.getElementById("cartCount").innerText=cart.length

renderCart()

}

function renderCart(){

let cont=document.getElementById("cartItems")
cont.innerHTML=""

cart.forEach((item,i)=>{

cont.innerHTML+=`
<div class="cart-item">
${item.nombre} - RD$${item.precio}
<button class="remove" onclick="removeItem(${i})">X</button>
</div>
`

})

document.getElementById("total").innerText=total

}

function removeItem(i){

total-=cart[i].precio
cart.splice(i,1)

document.getElementById("cartCount").innerText=cart.length

renderCart()

}

function toggleCart(){

document.getElementById("cartPanel").classList.toggle("open")

}

function buscar(){

let input=document.getElementById("search").value.toLowerCase()
let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let name=card.dataset.name

card.style.display = name.includes(input) ? "block" : "none"

})

}

function comprarWhatsApp(){

if(cart.length===0){
alert("El carrito está vacío")
return
}

let mensaje="Hola quiero comprar:%0A"

cart.forEach(item=>{
mensaje+=item.nombre+" - RD$"+item.precio+"%0A"
})

mensaje+="Total: RD$"+total

window.open("https://wa.me/18095462835?text="+mensaje)

}

</script>

</body>
</html>
