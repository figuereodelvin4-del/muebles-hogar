<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figuereo Muebles</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

header h1{
margin:0;
}

#search{
padding:8px;
border-radius:5px;
border:none;
}

.cart{
background:#27ae60;
padding:10px;
border-radius:5px;
}

.hero{
background:url("https://images.unsplash.com/photo-1618220179428-22790b461013") center/cover;
height:300px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:35px;
font-weight:bold;
}

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
padding:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#27ae60;
font-weight:bold;
font-size:18px;
}

button{
background:#27ae60;
border:none;
color:white;
padding:10px;
border-radius:5px;
cursor:pointer;
}

#cart{
background:white;
margin-top:30px;
padding:20px;
border-radius:10px;
}

.checkout{
background:#111;
width:100%;
padding:12px;
margin-top:15px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<h1>Figuereo Muebles</h1>

<input type="text" id="search" placeholder="Buscar muebles..." onkeyup="buscar()">

<div class="cart">
🛒 Carrito: <span id="cartCount">0</span>
</div>

</header>

<div class="hero">
Muebles modernos para tu hogar
</div>

<div class="container">

<h2>Catálogo</h2>

<div class="grid" id="productos">

<div class="card" data-name="sofa">
<img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc">
<h3>Sofá Moderno</h3>
<p class="price">RD$25,000</p>
<button onclick="addCart('Sofá Moderno',25000)">Agregar</button>
</div>

<div class="card" data-name="cama">
<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
<h3>Cama King</h3>
<p class="price">RD$35,000</p>
<button onclick="addCart('Cama King',35000)">Agregar</button>
</div>

<div class="card" data-name="mesa">
<img src="https://images.unsplash.com/photo-1588854337221-4cf9fa96059c">
<h3>Mesa Comedor</h3>
<p class="price">RD$18,000</p>
<button onclick="addCart('Mesa Comedor',18000)">Agregar</button>
</div>

<div class="card" data-name="silla">
<img src="https://images.unsplash.com/photo-1615874959474-d609969a20ed">
<h3>Silla Moderna</h3>
<p class="price">RD$4,500</p>
<button onclick="addCart('Silla Moderna',4500)">Agregar</button>
</div>

</div>

<div id="cart">

<h2>Carrito</h2>

<ul id="items"></ul>

<h3>Total: RD$<span id="total">0</span></h3>

<button class="checkout" onclick="pagar()">Comprar por WhatsApp</button>

</div>

</div>

<footer>

<p>📍 Azua de Compostela, República Dominicana</p>
<p>📞 809-546-2835</p>
<p>© 2026 Muebles Hogar</p>

</footer>

<script>

let cart=[]
let total=0

function addCart(nombre,precio){

cart.push({nombre,precio})

total+=precio

document.getElementById("cartCount").innerText=cart.length
document.getElementById("total").innerText=total

let li=document.createElement("li")
li.innerText=nombre+" - RD$"+precio

document.getElementById("items").appendChild(li)

}

function buscar(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let name=card.dataset.name

if(name.includes(input)){
card.style.display="block"
}else{
card.style.display="none"
}

})

}

function pagar(){

let mensaje="Hola quiero comprar:%0A"

cart.forEach(item=>{
mensaje+=item.nombre+" - RD$"+item.precio+"%0A"
})

mensaje+="Total: RD$"+total

window.open("https://wa.me/18095462835?text="+mensaje)

}

</script>

</body>
</html>
